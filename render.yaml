services:
  - type: web
    name: equipment-loan-management
    env: node
    plan: free
    buildCommand: npm run build && npm run migrate:deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
